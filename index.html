<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 리듬 게임 (D, F, J, K)</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        #setup-ui {
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            z-index: 100;
        }
        #setup-ui input {
            width: 350px;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
        }
        #setup-ui button {
            padding: 10px 20px;
            background-color: #ff0000;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        #setup-ui button:hover {
            background-color: #cc0000;
        }
        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: rgba(17, 17, 17, 0.85);
            border: 2px solid #555;
            overflow: hidden;
            display: none; 
            flex-direction: row;
        }
        /* 유튜브 영상을 게임 배경으로 깔기 */
        #youtube-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.5; /* 배경 영상 투명도 */
        }
        .track {
            flex: 1;
            border-right: 1px solid #333;
            position: relative;
        }
        .track:last-child {
            border-right: none;
        }
        .note {
            position: absolute;
            width: 100%;
            height: 30px;
            background-color: #00ffcc;
            border-radius: 5px;
            box-shadow: 0 0 10px #00ffcc;
        }
        #hit-line {
            position: absolute;
            bottom: 50px;
            width: 100%;
            height: 10px;
            background-color: rgba(255, 0, 0, 0.7);
            z-index: 10;
        }
        .key-label {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            color: #ccc;
            text-shadow: 1px 1px 2px black;
        }
        .key-active {
            background-color: rgba(255, 255, 255, 0.3);
        }
        #score-display {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="setup-ui">
        <h2>유튜브 링크를 넣어주세요</h2>
        <input type="text" id="youtube-url" placeholder="예: https://www.youtube.com/watch?v=어쩌구저쩌구">
        <br>
        <button onclick="startGame()">유튜브로 게임 시작!</button>
        <p style="font-size: 13px; color: #bbb; margin-top: 10px;">
            ※ 음악은 유튜브에서 재생되며, 노트는 무작위로 떨어집니다.
        </p>
    </div>

    <div id="score-display">점수: <span id="score">0</span></div>

    <div id="game-container">
        <div id="youtube-bg"></div>
        
        <div id="hit-line"></div>
        <div class="track" id="track-0"><div class="key-label">D</div></div>
        <div class="track" id="track-1"><div class="key-label">F</div></div>
        <div class="track" id="track-2"><div class="key-label">J</div></div>
        <div class="track" id="track-3"><div class="key-label">K</div></div>
    </div>

    <script>
        const scoreElement = document.getElementById('score');
        const setupUI = document.getElementById('setup-ui');
        const gameContainer = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score-display');
        
        const tracks = [
            document.getElementById('track-0'),
            document.getElementById('track-1'),
            document.getElementById('track-2'),
            document.getElementById('track-3')
        ];
        
        const keys = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };
        
        let notes = []; 
        let score = 0;
        let gameInterval;
        let animationId;
        const noteSpeed = 6; 
        const hitZone = 50; 
        const hitTolerance = 40; 
        let player;

        // 유튜브 URL에서 영상 ID(예: dQw4w9WgXcQ)만 뽑아내는 함수
        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function startGame() {
            const urlInput = document.getElementById('youtube-url').value;
            const videoId = extractVideoID(urlInput);

            if (!videoId) {
                alert("올바른 유튜브 링크를 입력해주세요!");
                return;
            }

            // 유튜브 플레이어 생성
            player = new YT.Player('youtube-bg', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    'autoplay': 1, // 자동재생 시도
                    'controls': 0, // 컨트롤러 숨김
                    'disablekb': 1, // 키보드 조작 막음 (게임이랑 겹치니까)
                    'rel': 0 
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            // 영상이 준비되면 재생 (브라우저 정책상 클릭 없이 자동재생이 막힐 수 있음)
            event.target.playVideo();
            
            // UI 전환
            setupUI.style.display = 'none';
            scoreDisplay.style.display = 'block';
            gameContainer.style.display = 'flex';
        }

        function onPlayerStateChange(event) {
            // 영상이 재생중(1)일 때 노트 떨어지기 시작
            if (event.data == YT.PlayerState.PLAYING && !gameInterval) {
                gameInterval = setInterval(spawnNote, 600); // 0.6초마다 노트 생성 (원하면 숫자 조절)
                gameLoop();
            }
            // 영상이 끝나거나 멈추면 노트 멈춤
            else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
        }

        function spawnNote() {
            const trackIndex = Math.floor(Math.random() * 4);
            const noteEl = document.createElement('div');
            noteEl.classList.add('note');
            noteEl.style.top = '-30px';
            tracks[trackIndex].appendChild(noteEl);

            notes.push({
                element: noteEl,
                track: trackIndex,
                y: -30
            });
        }

        function gameLoop() {
            for (let i = notes.length - 1; i >= 0; i--) {
                let note = notes[i];
                note.y += noteSpeed;
                note.element.style.top = note.y + 'px';

                if (note.y > 600) {
                    note.element.remove();
                    notes.splice(i, 1);
                }
            }
            animationId = requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys[key] !== undefined) {
                const trackIndex = keys[key];
                
                tracks[trackIndex].classList.add('key-active');
                setTimeout(() => tracks[trackIndex].classList.remove('key-active'), 100);

                const trackNotes = notes.filter(n => n.track === trackIndex);
                if (trackNotes.length > 0) {
                    const targetNote = trackNotes[0]; 
                    const distance = Math.abs(targetNote.y - (600 - hitZone - 30)); 

                    if (distance < hitTolerance) {
                        score += 100;
                        scoreElement.innerText = score;
                        targetNote.element.remove();
                        const indexToRemove = notes.indexOf(targetNote);
                        notes.splice(indexToRemove, 1);
                    }
                }
            }
        });
    </script>
</body>
</html>
